name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install Dependencies (stylesheet)
        run: npm ci
      - name: Lint (stylesheet)
        run: npm run lint
      - name: Build (stylesheet)
        run: npm run build
      - name: Install Dependencies (docs)
        run: npm ci
        working-directory: ./docs
      - name: Lint (docs)
        run: npm run lint
        working-directory: ./docs
      - name: Build (docs)
        run: npm run build
        working-directory: ./docs
